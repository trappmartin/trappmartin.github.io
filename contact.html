---
layout: default
title: Contact
description: Get in touch with me for research collaborations, speaking engagements, or academic inquiries.
permalink: /contact/
---

<section class="content-section content-section-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10">
                <h1 class="section-header h2 mb-4">Contact</h1>

                <div class="d-flex flex-wrap" style="gap: 1.75rem;">
                    <a href="mailto:{{ site.author.email }}" class="contact-link">
                        <i class="fas fa-envelope me-2" style="color: var(--gray-600);"></i>Email
                    </a>
                    {% if site.social.linkedin %}
                    <a href="{{ site.social.linkedin }}" target="_blank" class="contact-link">
                        <i class="fab fa-linkedin me-2" style="color: var(--gray-600);"></i>LinkedIn
                    </a>
                    {% endif %}
                    {% if site.social.bluesky %}
                    <a href="{{ site.social.bluesky }}" target="_blank" class="contact-link">
                        <i class="fab fa-brands fa-bluesky me-2" style="color: var(--gray-600);"></i>Bluesky
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</section>
